name: 새 설교 등록
description: 성공했던 방식과 동일하게, 설교 스크립트를 받아 오타 수정·분석·저장합니다.
title: "[설교등록] "
labels: ["sermon-request"]
body:
  - type: input
    id: youtube_url
    attributes:
      label: 유튜브 주소
      description: 원본 영상 주소를 기록용으로 입력합니다.
      placeholder: "https://www.youtube.com/watch?v=..."
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: 설교 제목
      placeholder: "예: 하나님이 세우시는 인생 멘토"
    validations:
      required: true

  - type: input
    id: speaker
    attributes:
      label: 설교자
      placeholder: "예: 이찬수 목사"
    validations:
      required: false

  - type: input
    id: bible_text
    attributes:
      label: 본문
      placeholder: "예: 디모데후서 1:1-3"
    validations:
      required: false

  - type: input
    id: church
    attributes:
      label: 교회/채널
      placeholder: "예: 분당우리교회"
    validations:
      required: false

  - type: input
    id: sermon_date
    attributes:
      label: 설교 날짜
      description: YYYY-MM-DD 형식을 권장합니다.
      placeholder: "2026-05-17"
    validations:
      required: false

  - type: textarea
    id: transcript
    attributes:
      label: 설교 스크립트
      description: 성공했던 실행과 동일하게, 이 본문을 바로 오타 수정·분석·저장합니다. 유튜브 영상 전사 단계는 실행하지 않습니다.
      placeholder: "유튜브 스크립트나 기존 설교 전사문 전체를 붙여넣으세요."
    validations:
      required: true

  - type: textarea
    id: memo
    attributes:
      label: 메모
      description: 참고할 내용이 있으면 적으세요.
      placeholder: "예: 예화 추출을 자세히 해주세요."
    validations:
      required: false
