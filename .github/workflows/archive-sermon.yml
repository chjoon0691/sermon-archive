name: Archive Sermon

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "유튜브 설교 영상 주소"
        required: true
        type: string
      sermon_title:
        description: "설교 제목, 모르면 비워두세요"
        required: false
        type: string
      speaker:
        description: "설교자, 모르면 비워두세요"
        required: false
        type: string
      bible_text:
        description: "본문, 예: 마태복음 5:1-3, 모르면 비워두세요"
        required: false
        type: string

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ffmpeg 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Python 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install openai yt-dlp pydub python-slugify

      - name: 설교 아카이브 생성
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_URL: ${{ inputs.youtube_url }}
          SERMON_TITLE: ${{ inputs.sermon_title }}
          SPEAKER: ${{ inputs.speaker }}
          BIBLE_TEXT: ${{ inputs.bible_text }}
        run: |
          python scripts/archive_sermon.py

      - name: 생성 결과 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data sermons
          git commit -m "Add sermon archive" || echo "No changes to commit"
          git push
