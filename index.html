<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설교 & 예화 스마트 아카이브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view-list { grid-template-columns: 1fr; }
        .view-grid { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">

    <div class="max-w-7xl mx-auto p-4 md:p-6">
        <!-- 헤더 -->
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-800 p-2 rounded-lg text-white font-bold">†</div>
                <h1 class="text-xl font-bold">설교·예화 스마트 아카이브</h1>
                <span class="text-sm text-gray-500 ml-2">유튜브 자막 및 텍스트 분석으로 완성하는 나만의 설교 서재</span>
            </div>
            <button class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1">
                <span class="w-2 h-2 bg-white rounded-full"></span> Gemini API 키 설정
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 왼쪽 패널 -->
            <div class="lg:col-span-1 space-y-6">
                <section class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                    <h2 class="font-bold mb-4 flex items-center gap-2"><span class="text-indigo-600">✨</span> 새 설교 등록 및 AI 자동 분석</h2>
                    <div class="flex border-b border-gray-200 mb-4">
                        <button class="px-4 py-2 border-b-2 border-indigo-600 font-bold text-sm">유튜브 주소 분석</button>
                        <button class="px-4 py-2 text-gray-500 text-sm">직접 텍스트 입력</button>
                    </div>
                    <label class="block text-xs text-gray-500 mb-2">유튜브 동영상 주소</label>
                    <input type="text" placeholder="https://www.youtube.com/watch?v=..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg mb-4 text-sm">
                    <button class="w-full bg-indigo-700 text-white py-3 rounded-lg font-bold hover:bg-indigo-800 transition">분석 및 아카이브 등록 시작</button>
                </section>

                <section class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                    <h2 class="font-bold mb-4 flex items-center gap-2"><span class="text-indigo-600">🏷️</span> 주제별 아카이브 맵</h2>
                    <div class="grid grid-cols-2 gap-3 text-xs">
                        <div class="p-3 bg-gray-50 rounded-lg border border-gray-100">예배 & 성전 <span class="block font-bold text-gray-400">1건</span></div>
                        <div class="p-3 bg-gray-50 rounded-lg border border-gray-100">믿음 & 순종 <span class="block font-bold text-gray-400">2건</span></div>
                        <div class="p-3 bg-gray-50 rounded-lg border border-gray-100">감사 & 찬양 <span class="block font-bold text-gray-400">0건</span></div>
                        <div class="p-3 bg-gray-50 rounded-lg border border-gray-100">고난 & 극복 <span class="block font-bold text-gray-400">0건</span></div>
                    </div>
                </section>
            </div>

            <!-- 오른쪽 메인 패널 -->
            <div class="lg:col-span-2">
                <div class="flex bg-white rounded-xl border border-gray-200 mb-6 p-1">
                    <button class="flex-1 py-3 bg-indigo-700 text-white rounded-lg font-bold">설교 아카이브 (1)</button>
                    <button class="flex-1 py-3 text-gray-500 font-medium">예화 스마트 참고 (1)</button>
                </div>

                <!-- 뷰 전환 컨트롤 추가 -->
                <div class="flex justify-end mb-4 gap-2">
                    <button onclick="setView('grid')" class="px-3 py-1 bg-white border rounded shadow-sm text-xs font-bold text-indigo-700">바둑판</button>
                    <button onclick="setView('list')" class="px-3 py-1 bg-white border rounded shadow-sm text-xs text-gray-600">리스트</button>
                </div>

                <div id="sermonContainer" class="grid gap-4 transition-all duration-300 view-grid">
                    <!-- 설교 카드 -->
                    <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs text-indigo-500 font-bold">이찬수 목사 | 2026-05-28</span>
                            <button class="text-gray-300 hover:text-red-500">🗑️</button>
                        </div>
                        <h3 class="font-bold text-lg mb-1">염려를 이기는 영원한 우선순위: 하나님의 나라와 의를 구하라</h3>
                        <p class="text-xs text-gray-500 mb-4">마태복음 6:31-33</p>
                        <div class="bg-gray-50 p-4 rounded-xl mb-4">
                            <p class="text-sm text-gray-700"><strong class="text-indigo-900">💡 3줄 핵심요약</strong><br>우리의 삶에 염려가 찾아오는 근본 원인은 세상의 덧없는 가치에 마음을 빼앗기는 데 있습니다...</p>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex gap-2 text-[10px] text-gray-500">
                                <span class="bg-gray-100 px-2 py-1 rounded">#예배</span>
                                <span class="bg-gray-100 px-2 py-1 rounded">#믿음</span>
                            </div>
                            <button class="text-xs text-indigo-600 font-bold hover:underline">설교 본문 & 예화 보기 ></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function setView(view) {
            const container = document.getElementById('sermonContainer');
            if (view === 'list') {
                container.classList.remove('view-grid');
                container.classList.add('view-list');
            } else {
                container.classList.remove('view-list');
                container.classList.add('view-grid');
            }
        }
    </script>
</body>
</html>
