<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설교 아카이브 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">⛪ 설교 아카이브 분석기</h1>
        
        <!-- 입력 섹션 -->
        <div class="flex gap-2 mb-8">
            <input type="text" id="youtubeUrl" placeholder="유튜브 설교 영상 URL을 입력하세요" 
                   class="flex-1 border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none">
            <button id="analyzeBtn" onclick="analyzeSermon()" 
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition disabled:bg-gray-400">분석하기</button>
        </div>

        <!-- 결과 표시 섹션 -->
        <div id="resultArea" class="hidden space-y-6">
            <div id="loading" class="text-center py-10 hidden">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-2"></div>
                <p class="text-gray-600">설교 내용을 분석 중입니다... (1분 정도 소요될 수 있습니다)</p>
            </div>
            
            <div id="content" class="space-y-6">
                <div id="metadata" class="bg-blue-50 p-4 rounded-lg">
                    <h2 id="title" class="text-xl font-bold text-blue-900"></h2>
                    <p id="preacher" class="text-blue-700"></p>
                    <p id="dateAndPassage" class="text-sm text-blue-600"></p>
                </div>

                <div>
                    <h3 class="font-semibold text-gray-700 mb-2">📌 설교 요점</h3>
                    <ul id="outlineList" class="list-decimal pl-5 space-y-1 text-gray-600"></ul>
                </div>

                <div>
                    <h3 class="font-semibold text-gray-700 mb-2">📖 주요 예화</h3>
                    <div id="illustrations" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analyzeSermon() {
            const url = document.getElementById('youtubeUrl').value;
            const btn = document.getElementById('analyzeBtn');
            const resultArea = document.getElementById('resultArea');
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');

            if (!url) return alert('URL을 입력해주세요.');

            // UI 상태 변경
            btn.disabled = true;
            resultArea.classList.remove('hidden');
            loading.classList.remove('hidden');
            content.classList.add('hidden');

            try {
                // ⚠️ 중요: 실제 백엔드 주소로 수정하세요!
                const response = await fetch('https://your-backend-api-url.com/analyze', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url }) 
                });

                if (!response.ok) throw new Error('서버 연결에 실패했습니다.');

                const data = await response.json();
                displayResult(data);
            } catch (error) {
                alert('분석 중 오류가 발생했습니다: ' + error.message);
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
                content.classList.remove('hidden');
            }
        }

        function displayResult(data) {
            document.getElementById('title').innerText = data.metadata.title;
            document.getElementById('preacher').innerText = `설교자: ${data.metadata.preacher}`;
            document.getElementById('dateAndPassage').innerText = `${data.metadata.date} | 본문: ${data.metadata.text}`;

            const outlineList = document.getElementById('outlineList');
            outlineList.innerHTML = data.outline.map(o => `<li><strong>${o.point}</strong>: ${o.content}</li>`).join('');

            const illuDiv = document.getElementById('illustrations');
            illuDiv.innerHTML = data.illustrations.map(i => `
                <div class="p-3 border-l-4 border-green-500 bg-gray-50">
                    <p class="font-medium">${i.index}. ${i.title}</p>
                    <p class="text-sm text-gray-600">${i.summary}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
